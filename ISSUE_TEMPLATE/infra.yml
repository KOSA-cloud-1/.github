name: Infrastructure Task
description: 인프라 작업 관리
title: "[INFRA] "
labels: ["infra"]
assignees: []

body:
  - type: textarea
    id: purpose
    attributes:
      label: 작업 목적 (Purpose)
      description: 왜 이 작업이 필요한지 설명하세요.
      placeholder: 예) 온프레미스 Kubernetes 노드 구성을 자동화하기 위해 필요합니다.
    validations:
      required: true

  - type: textarea
    id: task-description
    attributes:
      label: 작업 내용 (Task Description)
      description: 수행할 작업을 작성하세요.
      placeholder: |
        - Proxmox VM 생성
        - cloud-init 적용
        - kubeadm init/join 수행
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 영향 범위 (Scope)
      description: 해당되는 영역을 선택하세요.
      options:
        - label: AWS
        - label: Proxmox
        - label: Kubernetes
        - label: Network

  - type: textarea
    id: details
    attributes:
      label: 작업 상세 (Details)
      description: 명령어, 설정 파일, 참고 사항 등을 작성하세요.
      placeholder: |
        예)
        - Terraform module 수정
        - pfSense VLAN rule 추가
        - Kubernetes namespace 생성

  - type: checkboxes
    id: definition-of-done
    attributes:
      label: 완료 조건 (Definition of Done)
      options:
        - label: 정상 동작 확인
          required: true
        - label: 문서 반영 완료
          required: true
        - label: 테스트 완료
          required: true
